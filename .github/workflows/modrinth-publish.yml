name: Publish to Modrinth (Alpha)

on:
  push:
    branches: [ main, 26.2 ]
  workflow_dispatch:

env:
  JAVA_VERSION: '21'

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: 'maven'

      - name: Build with Maven
        run: mvn clean package -q

      - name: Prepare artifact
        id: prepare
        run: |
          VERSION=$(grep -m1 '<version>' pom.xml | sed 's/.*<version>\(.*\)<\/version>.*/\1/')
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          ARTIFACT_NAME="SkyeBlock-${VERSION}-${SHORT_SHA}.jar"
          cp target/SkyeBlock-*.jar "target/${ARTIFACT_NAME}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "artifact=${ARTIFACT_NAME}" >> "$GITHUB_OUTPUT"
          echo "Built: ${ARTIFACT_NAME}"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.prepare.outputs.artifact }}
          path: target/${{ steps.prepare.outputs.artifact }}

      - name: Upload to Modrinth
        uses: Modrinth/upload-artifact@v0.1.4
        with:
          file-path: target/${{ steps.prepare.outputs.artifact }}
          version-number: ${{ steps.prepare.outputs.version }}
          version-name: "Alpha ${{ steps.prepare.outputs.version }}-${{ steps.prepare.outputs.short_sha }}"
          version-tag: alpha
          game-versions: '[ "26.2" ]'
          loaders: '[ "paper", "spigot" ]'
          project-id: '${{ secrets.MODRINTH_PROJECT_ID }}'
          token: '${{ secrets.MODRINTH_TOKEN }}'
